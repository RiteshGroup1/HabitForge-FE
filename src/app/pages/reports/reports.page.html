<ion-header class="ion-no-border">
  <ion-toolbar color="primary">
    <ion-title>Analytics & Reports</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content>
  <ion-refresher slot="fixed" (ionRefresh)="doRefresh($event)">
    <ion-refresher-content></ion-refresher-content>
  </ion-refresher>

  <div class="stats-grid">
    <ion-card class="stat-card">
      <ion-card-content>
        <div class="stat-value">{{ totalCompleted }}</div>
        <div class="stat-label">Total Completed</div>
      </ion-card-content>
    </ion-card>
    <ion-card class="stat-card">
      <ion-card-content>
        <div class="stat-value">{{ successRate }}%</div>
        <div class="stat-label">Success Rate</div>
      </ion-card-content>
    </ion-card>
  </div>

  <!-- Charts temporarily disabled for debugging -->
  <ion-list class="performance-list">
    <ion-list-header>
      <ion-label>Monthly Highlights</ion-label>
    </ion-list-header>
    
    <ion-item>
      <ion-icon slot="start" icon="trophy-outline" color="warning"></ion-icon>
      <ion-label>
        <h3>Best Streak</h3>
        <p>15 days in March</p>
      </ion-label>
    </ion-item>
    
    <ion-item>
      <ion-icon slot="start" icon="trending-up-outline" color="success"></ion-icon>
      <ion-label>
        <h3>Most Productive</h3>
        <p>Fitness (90% success)</p>
      </ion-label>
    </ion-item>
  </ion-list>
</ion-content>
